<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>血染钟楼玩家角色手册 - 离线单文件版</title>
<style>
  :root{
    --bg:#111318; --card:#1b1f2a; --card2:#232938; --text:#f4f5f7; --muted:#aeb6c8;
    --line:#343b4f; --accent:#f0c060; --good:#8bd17c; --evil:#ff7777; --blue:#7cc7ff;
    --danger:#ff5b5b; --shadow:rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;line-height:1.45}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#171a22,#111318);border-bottom:1px solid var(--line);padding:10px 12px 7px}
  h1{font-size:19px;margin:0 0 4px;letter-spacing:.4px}
  h2{font-size:20px;margin:12px 0 10px}
  h3{font-size:18px;margin:10px 0 7px}
  p{margin:8px 0}
  .sub{color:var(--muted);font-size:12.5px}
  .wrap{max-width:520px;margin:0 auto;padding:10px 10px 84px}
  .tabs{display:flex;gap:8px;overflow:auto;padding:8px 0 2px}
  .tab{border:1px solid var(--line);background:#171b25;color:var(--text);border-radius:999px;padding:8px 12px;white-space:nowrap;font-weight:900;font-size:13px}
  .tab.active{background:var(--accent);color:#2a1b00;border-color:var(--accent)}
  .section{display:none}.section.active{display:block}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:13px;margin:10px 0;box-shadow:0 8px 18px var(--shadow)}
  .card.light{background:var(--card2)}
  .card.warn{background:#2c2016;border-color:#6b4b21}
  .small{font-size:13px;color:var(--muted)}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .right{margin-left:auto}
  .btn{border:0;border-radius:13px;padding:10px 13px;background:var(--accent);color:#2a1b00;font-weight:900;font-size:14px;box-shadow:0 3px 0 rgba(0,0,0,.2)}
  .btn.secondary{background:#2b3243;color:var(--text);border:1px solid var(--line)}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line);box-shadow:none}
  .btn.danger{background:var(--danger);color:white}
  .btn.full{width:100%;margin-top:8px}
  .btn:active{transform:translateY(1px)}
  .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 8px;background:#121722;color:var(--muted);font-size:12px;margin:2px;font-weight:800}
  .pill.good{color:var(--good);border-color:rgba(139,209,124,.45)}
  .pill.evil{color:var(--evil);border-color:rgba(255,119,119,.45)}
  .pill.info{color:var(--blue);border-color:rgba(124,199,255,.45)}
  .myRoleHidden .secret{filter:blur(9px);user-select:none}
  .secretHint{display:none;color:var(--muted);font-size:13px;margin-top:6px}
  .myRoleHidden .secretHint{display:block}
  .big{font-size:28px;font-weight:1000;letter-spacing:.5px}
  .roleGroup{margin:12px 0}
  .roleGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start}
  .groupTitle{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:1000;margin:14px 2px 8px;color:#fff}
  .groupIcon{width:30px;height:30px;display:inline-grid;place-items:center;border-radius:50%;background:#151a24;border:1px solid var(--line);font-size:18px}
  .roleItem{background:#151a24;border:1px solid var(--line);border-radius:15px;margin:0;overflow:hidden}
  .roleItem[open]{grid-column:1 / -1}
  .roleItem.good{border-color:rgba(139,209,124,.25)}
  .roleItem.evil{border-color:rgba(255,119,119,.25)}
  .roleHead{list-style:none;display:flex;align-items:center;gap:8px;padding:11px 10px;cursor:pointer;user-select:none;touch-action:manipulation;min-height:56px}
  .roleHead::-webkit-details-marker{display:none}
  .logo{width:30px;height:30px;flex:0 0 auto;display:grid;place-items:center;border-radius:50%;background:#0f131b;border:1px solid var(--line);font-size:17px;box-shadow:inset 0 0 0 2px rgba(255,255,255,.03)}
  .nameBox{min-width:0;flex:1}
  .roleName{font-size:18px;font-weight:1000;line-height:1.1;white-space:nowrap}
  .roleEn{display:none}
  .chev{font-size:18px;color:var(--muted);transition:.15s transform}
  details[open] .chev{transform:rotate(90deg)}
  .mineBadge{color:var(--muted);font-size:13px;font-weight:700;white-space:nowrap;opacity:.72}
  .roleBody{border-top:1px solid var(--line);padding:10px;background:rgba(255,255,255,.018);display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
  .roleBody .explain{font-size:15.5px;color:#fff;margin:0;line-height:1.45}
  .faqLink{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:8px 10px;color:var(--muted);font-size:13px;text-decoration:none;border:1px dashed var(--line);border-radius:12px;background:#101620;white-space:nowrap}
  .faqLink:active{color:var(--accent);border-color:rgba(240,192,96,.55)}
  .roleActions{display:flex;flex-direction:column;gap:8px;align-items:stretch}
  .noteTop{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .noteArea{width:100%;min-height:126px;border:1px solid var(--line);background:#0e1118;color:var(--text);border-radius:14px;padding:11px 12px;font-size:16px;line-height:1.45;resize:vertical;font-family:inherit}
  .canvasWrap{position:relative;width:100%;height:390px;background:#f4f0e6;border:1px solid var(--line);border-radius:16px;overflow:hidden;touch-action:none}
  #drawCanvas{width:100%;height:100%;display:block;touch-action:none}
  .hiddenPad{min-height:180px;display:grid;place-items:center;border:1px dashed var(--line);border-radius:16px;background:#101620;color:var(--muted);font-weight:900;text-align:center;padding:20px}
  .toolRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
  .toolRow .btn{flex:1 1 auto}
  .faqRole{scroll-margin-top:86px}
  .faqRole.flash{outline:2px solid rgba(240,192,96,.7)}
  .tipBox{background:#101620;border:1px dashed var(--line);border-radius:14px;padding:10px;margin:9px 0;color:#d7dced;font-size:14px}
  .footerNav{position:fixed;bottom:0;left:0;right:0;background:#10131a;border-top:1px solid var(--line);padding:8px 10px;display:flex;gap:8px;overflow:auto;z-index:30}
  .footerNav button{font-size:13px;padding:10px 12px}
  .toast{position:fixed;left:12px;right:12px;bottom:72px;background:#222a3a;color:#fff;border:1px solid var(--line);border-radius:15px;padding:12px 14px;z-index:1000;display:none;text-align:center;font-weight:800}
  .toast.show{display:block}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;display:none;align-items:center;justify-content:center;padding:18px}
  .modal.show{display:flex}
  .modalBox{width:min(460px,100%);max-height:92vh;overflow:auto;background:#141821;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 12px 36px rgba(0,0,0,.55)}
  .modalRole{font-size:36px;line-height:1.05;font-weight:1000;margin:8px 0}
  details.faq{background:#151a24;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}
  details.faq summary{font-weight:1000;font-size:18px;cursor:pointer}

  .flowIntro{background:#151a24;border:1px solid var(--line);border-radius:18px;padding:13px;margin:10px 0}
  .flowMeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .timeline{position:relative;margin:10px 0 0;padding-left:18px}
  .timeline:before{content:"";position:absolute;left:6px;top:10px;bottom:8px;width:2px;background:var(--line)}
  .flowStep{position:relative;background:#151a24;border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0}
  .flowStep:before{content:"";position:absolute;left:-16px;top:18px;width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--bg)}
  .flowStep h3{display:flex;align-items:center;gap:8px;margin:0 0 8px;font-size:17px}
  .flowStep .num{display:inline-grid;place-items:center;width:25px;height:25px;border-radius:50%;background:#0f131b;border:1px solid var(--line);font-size:13px;color:var(--accent)}
  .seatGrid{display:grid;grid-template-columns:1fr;gap:7px;margin:9px 0}
  .seatRow{display:flex;align-items:center;gap:8px;background:#101620;border:1px solid var(--line);border-radius:12px;padding:8px 9px;font-size:14px}
  .seatNo{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:50%;background:#0b0e14;border:1px solid var(--line);font-weight:1000;color:var(--muted);flex:0 0 auto}
  .quote{background:#101620;border-left:4px solid var(--accent);border-radius:10px;padding:8px 10px;margin:8px 0;color:#fff}
  .flowMini{font-size:13px;color:var(--muted);margin-top:6px}
  @media (max-width:380px){.wrap{padding-left:8px;padding-right:8px}.roleName{font-size:17px}.logo{width:28px;height:28px}.roleBody .explain{font-size:15px}.roleHead{padding-left:8px;padding-right:8px}.roleGrid{gap:7px}.canvasWrap{height:330px}.roleBody{grid-template-columns:1fr}}
  @media print{header,.footerNav,.btn{display:none!important}body{background:white;color:black}.card,.roleItem,details.faq{box-shadow:none;border:1px solid #999;background:white;color:black}.small,.sub,.roleEn{color:#333}.wrap{padding:0;max-width:none}}
</style>
</head>

let canvas=null, ctx=null, drawing=false, currentStroke=null;
function initCanvas(){
  canvas=$('drawCanvas'); if(!canvas) return;
  const rect=canvas.getBoundingClientRect();
  const ratio=window.devicePixelRatio||1;
  canvas.width=Math.max(1, Math.floor(rect.width*ratio));
  canvas.height=Math.max(1, Math.floor(rect.height*ratio));
  ctx=canvas.getContext('2d');
  ctx.setTransform(ratio,0,0,ratio,0,0);
  redrawCanvas();
  canvas.onpointerdown=startDraw;
  canvas.onpointermove=moveDraw;
  canvas.onpointerup=endDraw;
  canvas.onpointercancel=endDraw;
  canvas.onpointerleave=endDraw;
}
function canvasPoint(ev){
  const r=canvas.getBoundingClientRect();
  return {x:(ev.clientX-r.left)/Math.max(1,r.width), y:(ev.clientY-r.top)/Math.max(1,r.height)};
}
function startDraw(ev){
  ev.preventDefault(); if(!canvas) return; canvas.setPointerCapture?.(ev.pointerId);
  drawing=true; currentStroke=[canvasPoint(ev)]; drawStroke(currentStroke);
}
function moveDraw(ev){
  if(!drawing||!currentStroke) return; ev.preventDefault();
  currentStroke.push(canvasPoint(ev)); redrawCanvas(); drawStroke(currentStroke);
}
function endDraw(ev){
  if(!drawing||!currentStroke) return;
  drawing=false;
  if(currentStroke.length>1){state.drawingStrokes.push(currentStroke); save();}
  currentStroke=null; redrawCanvas();
}
function drawStroke(points){
  if(!ctx||!canvas||!points||!points.length) return;
  const r=canvas.getBoundingClientRect();
  const px=p=>({x:p.x*r.width, y:p.y*r.height});
  ctx.lineWidth=3.2; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#151515';
  const first=px(points[0]);
  ctx.beginPath(); ctx.moveTo(first.x, first.y);
  for(let i=1;i<points.length;i++){const pt=px(points[i]); ctx.lineTo(pt.x, pt.y);}
  ctx.stroke();
}
function redrawCanvas(){
  if(!ctx||!canvas) return;
  const r=canvas.getBoundingClientRect();
  ctx.clearRect(0,0,r.width,r.height);
  ctx.fillStyle='#f4f0e6'; ctx.fillRect(0,0,r.width,r.height);
  ctx.strokeStyle='rgba(0,0,0,.08)'; ctx.lineWidth=1;
  for(let y=32;y<r.height;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(r.width,y);ctx.stroke();}
  (state.drawingStrokes||[]).forEach(drawStroke);
}
function undoStroke(){
  if(!state.drawingStrokes?.length){toast('没有可撤销的手写');return;}
  state.drawingStrokes.pop(); save(); redrawCanvas();
}
