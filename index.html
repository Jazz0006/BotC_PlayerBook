<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>血染钟楼玩家离线助手 - 背景图叠加版</title>
<style>
  :root{
    --bg:#0b0d14; --card:#171b26; --card2:#202638; --text:#f6f1e7; --muted:#aeb6c8;
    --line:#30384d; --accent:#f0c060; --gold2:#a66b2c; --good:#93d884; --evil:#ff6d6d; --blue:#7cc7ff;
    --danger:#ff5b5b; --shadow:rgba(0,0,0,.44); --blood:#5b1218; --night:#101522;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(circle at 78% 0%,rgba(240,192,96,.16),transparent 24%),radial-gradient(circle at 12% 8%,rgba(91,18,24,.38),transparent 30%),linear-gradient(180deg,#090b12 0%,#101522 42%,#0b0d14 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;line-height:1.45;background-attachment:fixed}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,rgba(22,19,24,.96),rgba(11,13,20,.94));backdrop-filter:blur(10px);border-bottom:1px solid rgba(240,192,96,.18);padding:10px 12px 7px;box-shadow:0 10px 24px rgba(0,0,0,.22)}
  h1{font-size:19px;margin:0 0 4px;letter-spacing:.4px;color:#ffe3a1;text-shadow:0 0 18px rgba(240,192,96,.16)}
  h2{font-size:20px;margin:12px 0 10px}
  h3{font-size:18px;margin:10px 0 7px}
  p{margin:8px 0}
  .sub{color:var(--muted);font-size:12.5px}
  .wrap{max-width:520px;margin:0 auto;padding:10px 10px 84px}
  .tabs{display:flex;gap:8px;overflow:auto;padding:8px 0 2px}
  .tab{border:1px solid rgba(240,192,96,.14);background:rgba(20,24,35,.86);color:var(--text);border-radius:999px;padding:8px 12px;white-space:nowrap;font-weight:900;font-size:13px;box-shadow:inset 0 1px 0 rgba(255,255,255,.035)}
  .tab.active{background:linear-gradient(180deg,#ffe09a,#f0c060);color:#2a1b00;border-color:rgba(255,225,156,.9);box-shadow:0 4px 14px rgba(240,192,96,.24), inset 0 1px 0 rgba(255,255,255,.45)}
  .section{display:none}.section.active{display:block}
  .card{background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,0)),var(--card);border:1px solid rgba(240,192,96,.10);border-radius:18px;padding:13px;margin:10px 0;box-shadow:0 8px 18px var(--shadow)}
  .card.light{background:var(--card2)}
  .card.warn{background:#2c2016;border-color:#6b4b21}
  .small{font-size:13px;color:var(--muted)}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .right{margin-left:auto}
  .btn{border:0;border-radius:13px;padding:10px 13px;background:var(--accent);color:#2a1b00;font-weight:900;font-size:14px;box-shadow:0 3px 0 rgba(0,0,0,.2)}
  .btn.secondary{background:#2b3243;color:var(--text);border:1px solid var(--line)}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line);box-shadow:none}
  .btn.danger{background:var(--danger);color:white}
  .btn.full{width:100%;margin-top:8px}
  .btn:active{transform:translateY(1px)}
  .pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 8px;background:#121722;color:var(--muted);font-size:12px;margin:2px;font-weight:800}
  .pill.good{color:var(--good);border-color:rgba(139,209,124,.45)}
  .pill.evil{color:var(--evil);border-color:rgba(255,119,119,.45)}
  .pill.info{color:var(--blue);border-color:rgba(124,199,255,.45)}
  .myRoleHidden .secret{filter:blur(9px);user-select:none}
  .secretHint{display:none;color:var(--muted);font-size:13px;margin-top:6px}
  .myRoleHidden .secretHint{display:block}
  .big{font-size:28px;font-weight:1000;letter-spacing:.5px}
  .roleGroup{margin:12px 0}
  .roleGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:start}
  .groupTitle{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:1000;margin:14px 2px 8px;color:#fff}
  .groupIcon{width:32px;height:32px;display:inline-grid;place-items:center;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.16),rgba(255,255,255,0) 38%),linear-gradient(180deg,#171c29,#0f141f);border:1px solid rgba(240,192,96,.20);font-size:18px;box-shadow:0 0 0 2px rgba(240,192,96,.06), inset 0 0 0 1px rgba(255,255,255,.03)}
  .roleItem{background:#151a24;border:1px solid var(--line);border-radius:15px;margin:0;overflow:hidden}
  .roleItem[open]{grid-column:1 / -1}
  .roleItem.good{border-color:rgba(139,209,124,.25)}
  .roleItem.evil{border-color:rgba(255,119,119,.25)}
  .roleItem.good .logo{background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.18),rgba(255,255,255,0) 38%),linear-gradient(180deg,rgba(147,216,132,.18),#111723 78%);border-color:rgba(147,216,132,.36)}
  .roleItem.evil .logo{background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.14),rgba(255,255,255,0) 36%),linear-gradient(180deg,rgba(255,109,109,.20),#111723 78%);border-color:rgba(255,109,109,.38)}
  .roleHead{list-style:none;display:flex;align-items:center;gap:9px;padding:11px 10px;cursor:pointer;user-select:none;touch-action:manipulation;min-height:58px}
  .roleHead::-webkit-details-marker{display:none}
  .logo{width:34px;height:34px;flex:0 0 auto;display:grid;place-items:center;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.18),rgba(255,255,255,0) 38%),linear-gradient(180deg,#181d2b,#0f141d);border:1px solid rgba(240,192,96,.22);font-size:18px;box-shadow:0 0 0 2px rgba(240,192,96,.05),0 6px 12px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.03)}
  .nameBox{min-width:0;flex:1}
  .roleName{font-size:18px;font-weight:1000;line-height:1.1;white-space:nowrap}
  .roleEn{display:none}
  .chev{font-size:18px;color:var(--muted);transition:.15s transform}
  details[open] .chev{transform:rotate(90deg)}
  .mineBadge{color:var(--muted);font-size:13px;font-weight:700;white-space:nowrap;opacity:.72}
  .roleBody{border-top:1px solid var(--line);padding:10px;background:rgba(255,255,255,.018);display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}
  .roleBody .explain{font-size:15.5px;color:#fff;margin:0;line-height:1.45}
  .faqLink{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:8px 10px;color:var(--muted);font-size:13px;text-decoration:none;border:1px dashed var(--line);border-radius:12px;background:#101620;white-space:nowrap}
  .faqLink:active{color:var(--accent);border-color:rgba(240,192,96,.55)}
  .roleActions{display:flex;flex-direction:column;gap:8px;align-items:stretch}
  .noteTop{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .noteArea{width:100%;min-height:126px;border:1px solid var(--line);background:#0e1118;color:var(--text);border-radius:14px;padding:11px 12px;font-size:16px;line-height:1.45;resize:vertical;font-family:inherit}
  .canvasWrap{position:relative;width:100%;height:390px;background:#f4f0e6;border:1px solid var(--line);border-radius:16px;overflow:hidden;touch-action:none}
  #drawCanvas{width:100%;height:100%;display:block;touch-action:none}
  .hiddenPad{min-height:180px;display:grid;place-items:center;border:1px dashed var(--line);border-radius:16px;background:#101620;color:var(--muted);font-weight:900;text-align:center;padding:20px}
  .toolRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
  .toolRow .btn{flex:1 1 auto}
  .faqRole{scroll-margin-top:86px}
  .faqRole.flash{outline:2px solid rgba(240,192,96,.7)}
  .tipBox{background:#101620;border:1px dashed var(--line);border-radius:14px;padding:10px;margin:9px 0;color:#d7dced;font-size:14px}
  .footerNav{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(13,16,25,.92),rgba(8,10,16,.98));backdrop-filter:blur(10px);border-top:1px solid rgba(240,192,96,.16);padding:8px 10px;display:flex;gap:8px;overflow:auto;z-index:30;box-shadow:0 -10px 24px rgba(0,0,0,.28)}
  .footerNav button{font-size:13px;padding:10px 12px}
  @media (max-width:430px){
    .footerNav{gap:5px;padding:7px 7px;overflow:visible}
    .footerNav .tab{flex:1 1 0;min-width:0;padding:9px 5px;font-size:12px;text-align:center}
    .tabs .tab{font-size:12.5px;padding:8px 10px}
  }
  .toast{position:fixed;left:12px;right:12px;bottom:72px;background:#222a3a;color:#fff;border:1px solid var(--line);border-radius:15px;padding:12px 14px;z-index:1000;display:none;text-align:center;font-weight:800}
  .toast.show{display:block}

  .hero{position:relative;overflow:hidden;background:radial-gradient(circle at 18% 0%,rgba(240,192,96,.22),transparent 34%),linear-gradient(180deg,#242a38,#171b25);border:1px solid rgba(240,192,96,.26);border-radius:24px;padding:18px 16px;margin:8px 0 12px;box-shadow:0 10px 24px var(--shadow)}
  .hero:after{content:"☾";position:absolute;right:14px;top:2px;font-size:74px;color:rgba(240,192,96,.12);font-weight:1000;line-height:1}
  .heroKicker{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(240,192,96,.42);background:rgba(240,192,96,.1);color:var(--accent);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:1000}
  .heroTitle{font-size:25px;line-height:1.12;font-weight:1000;margin:12px 0 8px;letter-spacing:.3px;max-width:330px}
  .heroText{font-size:15.5px;color:#e9edf7;margin:0;max-width:390px}
  .heroActions{display:grid;grid-template-columns:1fr;gap:9px;margin-top:14px}
  .homeGrid{display:grid;grid-template-columns:1fr;gap:11px;margin:8px 0 10px}
  .homeSectionTitle{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:1000;margin:8px 2px 8px;color:#fff}
  .homeSectionTitle .badge{width:31px;height:31px;display:grid;place-items:center;border-radius:50%;background:#151a24;border:1px solid var(--line);box-shadow:inset 0 0 0 2px rgba(255,255,255,.03)}
  .goalGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .goalCard{position:relative;overflow:hidden;background:#151a24;border:1px solid var(--line);border-radius:18px;padding:13px 12px;min-height:112px;box-shadow:0 8px 18px rgba(0,0,0,.22);display:flex;gap:10px;align-items:flex-start}
  .goalCard:after{content:attr(data-icon);position:absolute;right:8px;bottom:-14px;font-size:62px;opacity:.07;line-height:1}
  .goalBadge{width:40px;height:40px;display:grid;place-items:center;flex:0 0 auto;border-radius:50%;font-size:21px;background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.18),rgba(255,255,255,0) 38%),linear-gradient(180deg,#1a2030,#0f131d);border:1px solid rgba(240,192,96,.20);box-shadow:0 0 0 2px rgba(240,192,96,.05), inset 0 0 0 1px rgba(255,255,255,.03)}
  .goalBody{min-width:0;flex:1}
  .goalCard.good{border-color:rgba(139,209,124,.45);background:linear-gradient(180deg,rgba(139,209,124,.10),rgba(21,26,36,1) 54%)}
  .goalCard.evil{border-color:rgba(255,119,119,.45);background:linear-gradient(180deg,rgba(255,119,119,.10),rgba(21,26,36,1) 54%)}
  .goalCard b{display:block;font-size:17px;margin-bottom:6px}
  .goalCard.good b{color:var(--good)}
  .goalCard.evil b{color:var(--evil)}
  .goalCard span{display:block;font-size:14px;color:#d7dced;line-height:1.42}
  .twoCols{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .tinyStat{background:#101620;border:1px solid var(--line);border-radius:17px;padding:11px 10px;min-height:98px;box-shadow:inset 0 1px 0 rgba(255,255,255,.025)}
  .tinyStat b{display:flex;align-items:center;gap:7px;font-size:15px;margin-bottom:6px;color:#fff;line-height:1.2}
  .tinyStat b .ico{display:inline-grid;place-items:center;width:25px;height:25px;border-radius:50%;background:#151a24;border:1px solid var(--line);flex:0 0 auto}
  .tinyStat span{display:block;font-size:13px;color:var(--muted);line-height:1.36}
  .assistantCard{background:radial-gradient(circle at 16% 0%,rgba(240,192,96,.16),transparent 30%),#201a10;border:1px solid rgba(240,192,96,.34);border-radius:19px;padding:14px 13px;margin:11px 0;box-shadow:0 9px 20px rgba(0,0,0,.24)}
  .assistantCard h3{display:flex;align-items:center;gap:8px;font-size:18px;margin:0 0 8px;color:var(--accent)}
  .assistantList{display:grid;gap:8px;margin-top:8px}
  .assistantItem{display:flex;gap:9px;align-items:flex-start;font-size:14px;color:#f4ead2;line-height:1.35}
  .assistantItem .dot{width:24px;height:24px;flex:0 0 auto;display:grid;place-items:center;border-radius:50%;background:rgba(240,192,96,.14);color:var(--accent);font-weight:1000;font-size:13px;border:1px solid rgba(240,192,96,.18)}
  .homeHint{font-size:12.5px;color:var(--muted);text-align:center;margin:11px 4px 0}


  /* 钟楼夜色主题：只做氛围，不增加阅读负担 */
  #home{position:relative;isolation:isolate;overflow:hidden}
  #home:before{content:"";position:absolute;right:18px;top:10px;width:84px;height:84px;border-radius:50%;background:radial-gradient(circle at 36% 35%,#fff6d8 0 9%,#f7d885 10% 44%,rgba(240,192,96,.22) 45% 68%,transparent 69%);box-shadow:0 0 32px rgba(240,192,96,.34),0 0 76px rgba(124,199,255,.10);z-index:-3;opacity:.88;pointer-events:none}
  #home:after{content:"";position:absolute;left:-4px;right:-4px;bottom:52px;height:138px;z-index:-2;pointer-events:none;opacity:.42;background:linear-gradient(180deg,transparent,rgba(10,12,18,.08) 36%,rgba(10,12,18,.22) 60%,rgba(10,12,18,.46) 100%),linear-gradient(#0b0d12,#0b0d12) 73% 3px/18px 22px no-repeat,linear-gradient(#0b0d12,#0b0d12) 70% 22px/24px 52px no-repeat,linear-gradient(135deg,transparent 0 48%,#0b0d12 49% 100%) 66% 56px/34px 18px no-repeat,linear-gradient(#0b0d12,#0b0d12) 67% 72px/32px 48px no-repeat,linear-gradient(#0b0d12,#0b0d12) 0 102px/100% 34px no-repeat,linear-gradient(135deg,transparent 0 50%,#0b0d12 51% 100%) 6% 88px/46px 16px no-repeat,linear-gradient(225deg,transparent 0 50%,#0b0d12 51% 100%) 20% 88px/46px 16px no-repeat,linear-gradient(#0b0d12,#0b0d12) 10% 104px/46px 14px no-repeat,linear-gradient(135deg,transparent 0 50%,#0b0d12 51% 100%) 28% 82px/52px 22px no-repeat,linear-gradient(225deg,transparent 0 50%,#0b0d12 51% 100%) 43% 82px/52px 22px no-repeat,linear-gradient(#0b0d12,#0b0d12) 32% 104px/54px 16px no-repeat,linear-gradient(135deg,transparent 0 50%,#0b0d12 51% 100%) 52% 90px/42px 14px no-repeat,linear-gradient(225deg,transparent 0 50%,#0b0d12 51% 100%) 62% 90px/42px 14px no-repeat,linear-gradient(#0b0d12,#0b0d12) 56% 104px/40px 14px no-repeat;filter:drop-shadow(0 0 14px rgba(240,192,96,.12))}
  .homeGrid{position:relative}
  .homeGrid:before{content:"";position:absolute;right:74px;top:84px;width:7px;height:7px;border-radius:50%;background:rgba(240,192,96,.68);box-shadow:0 14px 0 rgba(240,192,96,.46),0 28px 0 rgba(240,192,96,.34);z-index:-1;pointer-events:none}
  .homeGrid:after{content:"";position:absolute;left:6px;right:0;bottom:-4px;height:58px;background:radial-gradient(ellipse at center,rgba(240,192,96,.06),transparent 68%),linear-gradient(180deg,transparent,rgba(255,255,255,.03));z-index:-1;pointer-events:none}
  .homeSectionTitle{color:#ffe3a1;text-shadow:0 0 14px rgba(240,192,96,.10)}
  .homeSectionTitle .badge{background:linear-gradient(180deg,#241b18,#111722);border-color:rgba(240,192,96,.30);box-shadow:0 0 16px rgba(240,192,96,.08),inset 0 0 0 1px rgba(255,255,255,.03)}
  .goalCard{border-color:rgba(240,192,96,.12);background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,0)),#121823}
  .goalCard.good{border-color:rgba(147,216,132,.50);background:radial-gradient(circle at 82% 6%,rgba(147,216,132,.20),transparent 34%),linear-gradient(180deg,rgba(147,216,132,.10),rgba(18,24,35,1) 62%)}
  .goalCard.good .goalBadge{border-color:rgba(147,216,132,.42);background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.18),rgba(255,255,255,0) 38%),linear-gradient(180deg,rgba(147,216,132,.18),#101723 78%)}
  .goalCard.evil{border-color:rgba(255,109,109,.50);background:radial-gradient(circle at 82% 6%,rgba(255,109,109,.20),transparent 34%),linear-gradient(180deg,rgba(91,18,24,.38),rgba(18,24,35,1) 62%)}
  .goalCard.evil .goalBadge{border-color:rgba(255,109,109,.42);background:radial-gradient(circle at 35% 30%,rgba(255,255,255,.14),rgba(255,255,255,0) 36%),linear-gradient(180deg,rgba(255,109,109,.18),#101723 78%)}
  .goalCard.good:before,.goalCard.evil:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;opacity:.85}
  .goalCard.good:before{background:linear-gradient(180deg,#93d884,#4b9d69)}
  .goalCard.evil:before{background:linear-gradient(180deg,#ff7777,#8e2028)}
  .tinyStat{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0)),rgba(13,18,28,.94);border-color:rgba(240,192,96,.11);box-shadow:0 8px 18px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.025)}
  .tinyStat b .ico{background:linear-gradient(180deg,#241b18,#121723);border-color:rgba(240,192,96,.24);box-shadow:0 0 14px rgba(240,192,96,.08)}
  .assistantCard{background:radial-gradient(circle at 15% 0%,rgba(240,192,96,.20),transparent 32%),linear-gradient(180deg,rgba(91,18,24,.38),rgba(25,18,17,.94));border-color:rgba(240,192,96,.34);box-shadow:0 12px 25px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.035)}
  .assistantItem .dot{background:rgba(240,192,96,.14);border-color:rgba(240,192,96,.28);box-shadow:0 0 12px rgba(240,192,96,.08)}
  .roleItem,.flowStep,details.faq,.flowIntro{background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,0)),#121823;border-color:rgba(240,192,96,.10)}
  .groupIcon,.logo,.flowStep .num,.seatNo{border-color:rgba(240,192,96,.18);background:linear-gradient(180deg,#171b26,#0e121b)}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;display:none;align-items:center;justify-content:center;padding:18px}
  .modal.show{display:flex}
  .modalBox{width:min(460px,100%);max-height:92vh;overflow:auto;background:#141821;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 12px 36px rgba(0,0,0,.55)}
  .modalRole{font-size:36px;line-height:1.05;font-weight:1000;margin:8px 0}
  details.faq{background:#151a24;border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0}
  details.faq summary{font-weight:1000;font-size:18px;cursor:pointer}

  .flowIntro{background:#151a24;border:1px solid var(--line);border-radius:18px;padding:13px;margin:10px 0}
  .flowMeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .timeline{position:relative;margin:10px 0 0;padding-left:18px}
  .timeline:before{content:"";position:absolute;left:6px;top:10px;bottom:8px;width:2px;background:var(--line)}
  .flowStep{position:relative;background:#151a24;border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0}
  .flowStep:before{content:"";position:absolute;left:-16px;top:18px;width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--bg)}
  .flowStep h3{display:flex;align-items:center;gap:8px;margin:0 0 8px;font-size:17px}
  .flowStep .num{display:inline-grid;place-items:center;width:25px;height:25px;border-radius:50%;background:#0f131b;border:1px solid var(--line);font-size:13px;color:var(--accent)}
  .seatGrid{display:grid;grid-template-columns:1fr;gap:7px;margin:9px 0}
  .seatRow{display:flex;align-items:center;gap:8px;background:#101620;border:1px solid var(--line);border-radius:12px;padding:8px 9px;font-size:14px}
  .seatNo{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:50%;background:#0b0e14;border:1px solid var(--line);font-weight:1000;color:var(--muted);flex:0 0 auto}
  .quote{background:#101620;border-left:4px solid var(--accent);border-radius:10px;padding:8px 10px;margin:8px 0;color:#fff}

let canvas=null, ctx=null, drawing=false, currentStroke=null;
function initCanvas(){
  canvas=$('drawCanvas'); if(!canvas) return;
  const rect=canvas.getBoundingClientRect();
  const ratio=window.devicePixelRatio||1;
  canvas.width=Math.max(1, Math.floor(rect.width*ratio));
  canvas.height=Math.max(1, Math.floor(rect.height*ratio));
  ctx=canvas.getContext('2d');
  ctx.setTransform(ratio,0,0,ratio,0,0);
  redrawCanvas();
  canvas.onpointerdown=startDraw;
  canvas.onpointermove=moveDraw;
  canvas.onpointerup=endDraw;
  canvas.onpointercancel=endDraw;
  canvas.onpointerleave=endDraw;
}
function canvasPoint(ev){
  const r=canvas.getBoundingClientRect();
  return {x:(ev.clientX-r.left)/Math.max(1,r.width), y:(ev.clientY-r.top)/Math.max(1,r.height)};
}
function startDraw(ev){
  ev.preventDefault(); if(!canvas) return; canvas.setPointerCapture?.(ev.pointerId);
  drawing=true; currentStroke=[canvasPoint(ev)]; drawStroke(currentStroke);
}
function moveDraw(ev){
  if(!drawing||!currentStroke) return; ev.preventDefault();
  currentStroke.push(canvasPoint(ev)); redrawCanvas(); drawStroke(currentStroke);
}
function endDraw(ev){
  if(!drawing||!currentStroke) return;
  drawing=false;
  if(currentStroke.length>1){state.drawingStrokes.push(currentStroke); save();}
  currentStroke=null; redrawCanvas();
}
function drawStroke(points){
  if(!ctx||!canvas||!points||!points.length) return;
  const r=canvas.getBoundingClientRect();
  const px=p=>({x:p.x*r.width, y:p.y*r.height});
  ctx.lineWidth=3.2; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#151515';
  const first=px(points[0]);
  ctx.beginPath(); ctx.moveTo(first.x, first.y);
  for(let i=1;i<points.length;i++){const pt=px(points[i]); ctx.lineTo(pt.x, pt.y);}
  ctx.stroke();
}
function redrawCanvas(){
  if(!ctx||!canvas) return;
  const r=canvas.getBoundingClientRect();
  ctx.clearRect(0,0,r.width,r.height);
  ctx.fillStyle='#f4f0e6'; ctx.fillRect(0,0,r.width,r.height);
  ctx.strokeStyle='rgba(0,0,0,.08)'; ctx.lineWidth=1;
  for(let y=32;y<r.height;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(r.width,y);ctx.stroke();}
  (state.drawingStrokes||[]).forEach(drawStroke);
}
function undoStroke(){
  if(!state.drawingStrokes?.length){toast('没有可撤销的手写');return;}
  state.drawingStrokes.pop(); save(); redrawCanvas();
}

function renderProcess(){
  $('process').innerHTML = `
    <div class="flowIntro">
      <h2>5人局流程示例</h2>
      <p>这是一个从上帝视角看的示例，帮助玩家理解“发身份 → 第一夜 → 白天讨论 → 提名处决 → 后续夜晚 → 胜负判断”。</p>
      <div class="flowMeta"><span class="pill good">好人：洗衣妇、占卜师、士兵、酒鬼</span><span class="pill evil">邪恶：小恶魔</span></div>
    </div>
    <div class="timeline">
      <div class="flowStep">
        <h3><span class="num">1</span>开局发身份</h3>
        <div class="seatGrid">
          <div class="seatRow"><span class="seatNo">1</span>洗衣妇</div>
          <div class="seatRow"><span class="seatNo">2</span>占卜师</div>
          <div class="seatRow"><span class="seatNo">3</span>士兵</div>
          <div class="seatRow"><span class="seatNo">4</span>显示身份：共情者；真实身份：酒鬼</div>
          <div class="seatRow"><span class="seatNo">5</span>小恶魔</div>
        </div>
        <p class="flowMini">玩家只知道自己被告知的身份。4号只知道自己是“共情者”，不知道自己真实是酒鬼。</p>
      </div>
      <div class="flowStep">
        <h3><span class="num">2</span>第一夜：恶魔获得伪装</h3>
        <p>5号小恶魔醒来。因为这是 5 人示例局，他知道自己是唯一邪恶玩家，并获得几个不在场身份作为伪装，例如“僧侣、杀手、厨师”。</p>
        <div class="quote">小恶魔之后可以假装自己是僧侣、杀手或厨师。</div>
        <p class="flowMini">第一夜小恶魔通常不杀人。</p>
      </div>
      <div class="flowStep">
        <h3><span class="num">3</span>第一夜：好人获得信息</h3>
        <p><b>1号洗衣妇</b>的技能是：第一夜得知两个玩家中有一人是某个镇民。他被告知：</p>
        <div class="quote">2号和4号中有一人是占卜师。</div>
        <p><b>2号占卜师</b>的技能是：每晚选择两名玩家，得知其中是否有恶魔。2号选择 4号和5号，因为里面包含 5号小恶魔，因此 2号被告知：</p>
        <div class="quote">是。</div>
        <p><b>3号士兵</b>是被动能力：恶魔夜里杀他时，他不会因此死亡。第一夜通常不需要醒来，也不会获得信息。</p>
        <p><b>4号真实身份是酒鬼</b>，但他被告知的身份是共情者。共情者的技能是：每晚得知自己两个存活邻居中有几个邪恶玩家。4号的邻居是 3号和5号，其中 5号是邪恶，所以真实数字本来是 1。</p>
        <p>但是 4号是酒鬼，他的能力没有效果。因此说书人可以告诉他“1”，也可以告诉他“0”或其他数字。这个数字可能为真，也可能为假，完全不确定。</p>
        <div class="quote">4号被告知：0。<br>这会让 4号误以为 3号和5号都不像邪恶，但这个信息不可靠。</div>
      </div>
      <div class="flowStep">
        <h3><span class="num">4</span>第一天：公开讨论</h3>
        <p>大家醒来后开始发言。好人通常会分享信息来互相验证，但不一定要立刻全说；恶魔会伪装成好人身份，尽量解释自己的行为和信息。</p>
        <div class="quote">1号说：我知道 2号和4号里有一人是占卜师。<br>2号说：我是占卜师，我查了 4号和5号，结果是“是”。<br>4号说：我是共情者，我左右是 3号和5号，我得到 0。<br>5号说：我可能是僧侣，先不想说太多。</div>
        <p class="flowMini">此时出现了典型冲突：2号的信息指向 4号或5号有恶魔；4号的信息却像是在保护 5号。真相是：2号信息可靠，4号是酒鬼，信息不可靠。</p>
      </div>
      <div class="flowStep">
        <h3><span class="num">5</span>第一天：提名与处决</h3>
        <p>讨论一段时间后，进入提名阶段。玩家可以提名一名玩家，并简单说明理由；被提名者通常也可以为自己辩解。</p>
        <p>例如，2号提名 5号，理由是：自己查了 4号和5号得到“是”，而 4号的共情者信息与自己冲突，5号又不愿明确说明身份。</p>
        <div class="quote">2号提名 5号。<br>2号说明理由。<br>5号辩解：也可能是 4号有问题，或者 2号在说谎。</div>
        <p>然后开始投票。说书人会按座位顺序数票。只有票数达到处决门槛，并且成为当前最高票，才会暂时进入“即将被处决”的状态。</p>
        <p>白天可以有多次提名。后面的提名如果票数更高，可以取代前一个即将被处决的人；如果没有更高票，原来的结果保留。</p>
        <p>在这个示例中，大家还不确定 5号是否真是恶魔，所以 5号票数不够，第一天无人处决。</p>
        <div class="quote">结果：无人被处决，进入第二夜。</div>
        <p class="flowMini">无人处决很常见。新手局第一天信息不够时，玩家可能选择再观察一晚。</p>
      </div>
      <div class="flowStep">
        <h3><span class="num">6</span>第二夜：好人行动与恶魔杀人</h3>
        <p>第二夜，<b>2号占卜师仍然存活</b>，所以他的技能还能发动。他再次醒来，选择 3号和5号。因为里面包含 5号小恶魔，因此他再次被告知：</p>
        <div class="quote">是。</div>
        <p>3号士兵是被动能力，不醒来；4号以为自己是共情者，也会像共情者一样被叫醒，但因为真实是酒鬼，得到的数字仍然可能真也可能假。</p>
        <p>随后 5号小恶魔醒来，选择杀死 2号占卜师。天亮后，说书人宣布：</p>
        <div class="quote">昨晚，2号死亡。</div>
        <p class="flowMini">死亡不等于出局。2号仍然参与游戏，但从这一刻起失去角色能力，也不会再在夜晚发动占卜师技能。</p>
      </div>
      <div class="flowStep">
        <h3><span class="num">7</span>第二天：死亡玩家仍然参与</h3>
        <p>2号已经死亡，但仍然可以继续说话、参与讨论、公开自己的信息、帮助大家分析谁更像恶魔。</p>
        <p>死亡玩家失去角色能力，不能再提名；仍然可以投票，但整局通常只剩 <b>一次鬼票</b>，用完后之后就不能再投票。</p>
        <div class="quote">2号可以说：我死了，但我两晚占卜都指向 5号很可疑。我不能提名了，但我还能发言，也可以把唯一一次鬼票留给关键投票。</div>
        <p>这也是血染钟楼和很多狼人杀不同的地方：死亡玩家不会离开游戏，仍然可以继续推理和影响局势。</p>
      </div>
      <div class="flowStep">
        <h3><span class="num">8</span>第二天：信息继续收束</h3>
        <p>1号的信息支持 2号是真的占卜师；2号死亡前的信息指向 4号或5号；4号的信息保护了 5号，但4号真实是酒鬼，所以不能单独采信。</p>
        <p>3号士兵可以说：如果恶魔夜里杀我，我可能不会死。5号昨晚没有杀我，而是杀了占卜师，说明他可能在躲开士兵能力。</p>
        <p class="flowMini">血染钟楼的核心体验：把夜晚信息、死亡顺序、提名投票、发言逻辑拼起来。</p>
      </div>
      <div class="flowStep">
        <h3><span class="num">9</span>第二天：再次提名并处决</h3>
        <p>经过讨论，1号或3号这样的存活玩家可以提名 5号；2号已经死亡，不能提名，但可以发言帮大家整理信息。</p>
        <p>处决门槛按<b>存活玩家数量</b>计算：至少需要达到存活人数的一半，向上取整。此时 1号、3号、4号、5号存活，共 4 名存活玩家，所以至少需要 2 票。若有多个被提名者，最终只有票数达到门槛且票数最高的人会被处决；平票则无人被处决。</p>
        <div class="quote">3号提名 5号。<br>5号至少需要 2 票才可能被处决。<br>2号可以使用鬼票参与这次投票，但用掉后以后不能再投票。</div>
        <p>这次 5号获得足够票数，并且没有后续提名超过他。当天结束时，5号被处决。</p>
        <p>处决发生后，如果被处决者是恶魔，游戏通常立即结束。</p>
      </div>
      <div class="flowStep">
        <h3><span class="num">10</span>处决恶魔，游戏结束</h3>
        <p>5号真实身份是小恶魔。5号被处决后，恶魔死亡。</p>
        <div class="quote">恶魔死亡，好人阵营获胜。</div>
        <p class="flowMini">如果当天处决错人，游戏会继续。若最后只剩 2 名存活玩家且恶魔仍存活，通常邪恶阵营获胜。</p>
      </div>
    </div>`;
}
